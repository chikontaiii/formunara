<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Прошу прощения ♡</title>
    <style>
         :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }
        
        html,
        body {
            height: 100%;
            margin: 0;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: linear-gradient(180deg, #fdf2fb 0%, #ffd7ed 50%, #f7c0e6 100%);
            overflow: hidden;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }
        
        #text {
            pointer-events: none;
        }
        
        .info {
            position: absolute;
            bottom: calc(18px + var(--safe-bottom));
            left: calc(18px + var(--safe-left));
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.18);
            padding: 8px 14px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        
        .controls {
            position: absolute;
            top: calc(16px + var(--safe-top));
            right: calc(16px + var(--safe-right));
            display: flex;
            gap: 10px;
            z-index: 10;
            pointer-events: auto;
        }
        
        .controls button {
            background: rgba(255, 255, 255, 0.88);
            border: 0;
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.2px;
            color: #d44a8c;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 12px rgba(180, 60, 120, 0.15);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-width: 80px;
            text-align: center;
        }
        
        .controls button:active {
            transform: scale(0.94);
            box-shadow: 0 1px 6px rgba(180, 60, 120, 0.2);
            background: rgba(255, 255, 255, 0.98);
        }
        
        @media (max-width: 480px) {
            .controls button {
                padding: 11px 15px;
                font-size: 14px;
                border-radius: 12px;
                min-width: 70px;
            }
            .info {
                font-size: 13px;
                padding: 7px 11px;
                bottom: calc(14px + var(--safe-bottom));
                left: calc(12px + var(--safe-left));
            }
        }
    </style>
</head>

<body>
    <canvas id="bg"></canvas>
    <canvas id="text"></canvas>

    <div class="controls">
        <button id="assemble">♡ Собрать</button>
        <button id="scatter">✧ Сломать</button>
    </div>
    <div class="info">♡</div>

    <script>
        /*
         *  Частицы собираются в три строки:
         *  кемуму
         *  кечирип
         *  койчу
         *
         *  Оптимизировано под iPhone 16 Pro (430×932 logical px)
         *  и другие мобильные экраны.
         */

        /* =========== Параметры =========== */
        const PHRASE = "Кемуму\nкечирип\nкойчу";
        const SAMPLE_STEP = 5; // чем меньше — тем больше частиц
        const ASSEMBLE_DELAY = 900; // ms перед автосборкой
        const ASSEMBLE_DURATION = 1300; // ms перехода
        const BG_HEART_COUNT = 22; // фоновых сердечек
        /* ================================== */

        const bgCanvas = document.getElementById('bg');
        const textCanvas = document.getElementById('text');
        const bgCtx = bgCanvas.getContext('2d');
        const ctx = textCanvas.getContext('2d');

        function resize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgCanvas.width = w;
            bgCanvas.height = h;
            textCanvas.width = w;
            textCanvas.height = h;
        }
        window.addEventListener('resize', resize);
        resize();

        /* ---------- ФОН: плавающие сердечки ---------- */
        class BgHeart {
            constructor() {
                this.reset(true);
            }
            reset(justInit = false) {
                const w = window.innerWidth;
                const h = window.innerHeight;
                this.x = Math.random() * w;
                this.y = justInit ? Math.random() * h : h + Math.random() * 120;
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = -(0.3 + Math.random() * 0.9);
                this.size = 7 + Math.random() * 30;
                this.alpha = 0.1 + Math.random() * 0.55;
                this.rotation = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.012;
                this.color =
                    `rgba(255,${120 + Math.floor(Math.random() * 80)},${185 + Math.floor(Math.random() * 45)},${this.alpha})`;
            }
            update() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.spin;
                if (this.y + this.size < -60 || this.x < -120 || this.x > w + 120) this.reset();
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                const s = this.size / 20;
                ctx.beginPath();
                ctx.moveTo(0, -10 * s);
                ctx.bezierCurveTo(12 * s, -32 * s, 50 * s, -12 * s, 0, 28 * s);
                ctx.bezierCurveTo(-50 * s, -12 * s, -12 * s, -32 * s, 0, -10 * s);
                ctx.closePath();
                const g = ctx.createLinearGradient(-this.size / 2, -this.size, this.size / 2, this.size);
                g.addColorStop(0, 'rgba(255,200,230,' + this.alpha + ')');
                g.addColorStop(1, this.color);
                ctx.fillStyle = g;
                ctx.fill();
                ctx.restore();
            }
        }

        const bgHearts = [];
        for (let i = 0; i < BG_HEART_COUNT; i++) bgHearts.push(new BgHeart());

        function drawBackground() {
            const w = bgCanvas.width;
            const h = bgCanvas.height;
            bgCtx.clearRect(0, 0, w, h);
            const g = bgCtx.createLinearGradient(0, 0, 0, h);
            g.addColorStop(0, 'rgba(255,238,250,0.5)');
            g.addColorStop(1, 'rgba(246,200,230,0.2)');
            bgCtx.fillStyle = g;
            bgCtx.fillRect(0, 0, w, h);
            for (const heart of bgHearts) {
                heart.update();
                heart.draw(bgCtx);
            }
        }

        /* ---------- ТЕКСТ: частицы ---------- */
        let particles = [];
        let targets = [];
        let scattering = true;

        class Particle {
            constructor(x, y, color) {
                const w = window.innerWidth;
                const h = window.innerHeight;
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 1.8;
                this.vy = (Math.random() - 0.5) * 1.8;
                this.tx = x;
                this.ty = y;
                this.color = color || '#ff6fbf';
                // размер частицы адаптивен к ширине экрана
                const baseSize = Math.max(3.5, Math.min(6, window.innerWidth / 110));
                this.size = baseSize * (0.7 + Math.random() * 0.9);
                this.progress = 0;
                this.delay = Math.random() * 280;
                this.state = 'float';
                this.wob = Math.random() * Math.PI * 2;
            }
            update(dt) {
                if (this.state === 'toTarget') {
                    this.progress += dt / ASSEMBLE_DURATION;
                    if (this.progress > 1) {
                        this.progress = 1;
                        this.state = 'target';
                    }
                    const ease = 1 - Math.pow(1 - this.progress, 3);
                    this.x = this.startX + (this.tx - this.startX) * ease;
                    this.y = this.startY + (this.ty - this.startY) * ease;
                } else if (this.state === 'scatter') {
                    this.vx *= 0.994;
                    this.vy *= 0.994;
                    this.x += this.vx;
                    this.y += this.vy;
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    if (this.x < -40) this.x = w + 40;
                    if (this.x > w + 40) this.x = -40;
                    if (this.y < -40) this.y = h + 40;
                    if (this.y > h + 40) this.y = -40;
                } else if (this.state === 'float') {
                    this.wob += dt * 0.004;
                    this.x += Math.cos(this.wob) * 0.35;
                    this.y += Math.sin(this.wob) * 0.35;
                } else if (this.state === 'target') {
                    this.wob += dt * 0.01;
                    this.x = this.tx + Math.sin(this.wob) * 0.7;
                    this.y = this.ty + Math.cos(this.wob) * 0.7;
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                const s = this.size / 16;
                ctx.scale(s, s);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, -7);
                ctx.bezierCurveTo(4, -18, 24, -12, 0, 16);
                ctx.bezierCurveTo(-24, -12, -4, -18, 0, -7);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        /* Создание целей из многострочного текста */
        function createTargetsFromText(text) {
            const off = document.createElement('canvas');
            const offCtx = off.getContext('2d');

            const lines = text.split('\n');
            const w = window.innerWidth;
            const h = window.innerHeight;

            // Адаптивный размер шрифта: на ~430px ширины → ~72–78px
            const fontSize = Math.max(48, Math.min(100, Math.floor(w / 5.6)));
            const lineHeight = fontSize * 1.4;
            const totalTextHeight = lines.length * lineHeight;

            off.width = Math.max(w * 1.15, 500);
            off.height = Math.max(totalTextHeight + 140, h * 0.55);

            offCtx.clearRect(0, 0, off.width, off.height);
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            offCtx.font = `bold ${fontSize}px "Inter", "Segoe UI", Roboto, Arial, sans-serif`;

            const strokeW = Math.max(3, fontSize / 14);
            offCtx.lineWidth = strokeW;
            offCtx.strokeStyle = 'rgba(0,0,0,0.2)';
            offCtx.fillStyle = '#000';

            const cx = off.width / 2;
            const cy = off.height / 2;
            const startY = cy - totalTextHeight / 2 + lineHeight / 2;

            for (let i = 0; i < lines.length; i++) {
                const yPos = startY + i * lineHeight;
                offCtx.strokeText(lines[i], cx, yPos);
                offCtx.fillText(lines[i], cx, yPos);
            }

            // Сэмплируем пиксели
            const img = offCtx.getImageData(0, 0, off.width, off.height).data;
            const arr = [];
            const step = Math.max(5, Math.min(10, Math.floor(w / 60)));
            for (let y = 0; y < off.height; y += step) {
                for (let x = 0; x < off.width; x += step) {
                    const idx = (y * off.width + x) * 4;
                    const alpha = img[idx + 3];
                    if (alpha > 55) {
                        const screenX = (x - off.width / 2) + w / 2;
                        const screenY = (y - off.height / 2) + h / 2;
                        arr.push({
                            x: screenX,
                            y: screenY
                        });
                    }
                }
            }

            return arr;
        }

        function initParticles() {
            targets = createTargetsFromText(PHRASE);
            particles = [];
            const pal = ['#ff6fbf', '#ff8acb', '#ff4fa1', '#ffaacd', '#ff5ea8', '#ff78b8', '#ff99d6'];

            for (let i = 0; i < targets.length; i++) {
                const t = targets[i];
                const color = pal[Math.floor(Math.random() * pal.length)];
                const p = new Particle(
                    t.x + (Math.random() - 0.5) * 5,
                    t.y + (Math.random() - 0.5) * 5,
                    color
                );
                p.x = Math.random() * window.innerWidth;
                p.y = Math.random() * window.innerHeight;
                p.startX = p.x;
                p.startY = p.y;
                p.state = 'float';
                particles.push(p);
            }

            // Дополнительные частицы для фона
            const extraCount = Math.min(140, Math.floor(window.innerWidth / 3.5));
            for (let i = 0; i < extraCount; i++) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const color = pal[Math.floor(Math.random() * pal.length)];
                const p = new Particle(x, y, color);
                p.state = 'scatter';
                particles.push(p);
            }
        }

        function assemble() {
            scattering = false;
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const t = targets[i] || {
                    x: window.innerWidth / 2 + (Math.random() - 0.5) * 220,
                    y: window.innerHeight / 2 + (Math.random() - 0.5) * 80,
                };
                p.tx = t.x;
                p.ty = t.y;
                p.startX = p.x;
                p.startY = p.y;
                p.progress = 0;
                const delay = Math.random() * 250;
                setTimeout(() => {
                    if (p.state !== 'target') {
                        p.state = 'toTarget';
                    }
                }, delay);
            }
        }

        function scatter() {
            scattering = true;
            for (const p of particles) {
                p.state = 'scatter';
                const angle = Math.random() * Math.PI * 2;
                const speed = 4 + Math.random() * 7;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
            }
        }

        /* Анимация */
        let last = performance.now();

        function loop(now) {
            const dt = Math.min(now - last, 50); // cap dt чтобы избежать скачков
            last = now;

            drawBackground();
            ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            for (const p of particles) {
                p.update(dt);
                p.draw(ctx);
            }
            requestAnimationFrame(loop);
        }

        /* Инициализация */
        initParticles();
        requestAnimationFrame(loop);

        // Автосборка
        setTimeout(assemble, ASSEMBLE_DELAY + 500);

        // Кнопки
        document.getElementById('assemble').addEventListener('click', assemble);
        document.getElementById('scatter').addEventListener('click', scatter);

        // Пересборка при ресайзе
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                resize();
                initParticles();
                setTimeout(assemble, 400);
            }, 250);
        });

        // Обработка изменения ориентации на мобильных
        if (window.matchMedia) {
            window.matchMedia('(orientation: portrait)').addEventListener('change', () => {
                setTimeout(() => {
                    resize();
                    initParticles();
                    setTimeout(assemble, 400);
                }, 300);
            });
        }
    </script>
</body>

</html>
